name: CD
on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed

jobs:
  pull_and_run_code:
    runs-on: self-hosted

    steps:
      - name: Stop the containers
        run: docker stop test-calc || true

      - name: Remove the container test-calc
        run: docker rm test-calc || true

      - name: Get the code from Docker Hub
        run: docker pull monyslim/test-image

      - name: Run the image as an app
        env:
          IMAGE_NAME: test-image
          USERNAME: monyslim
        run: |
           docker run -d -p 3004:3000 --name test-calc $USERNAME/$IMAGE_NAME:${{ env.APP_VERSION }}

      - name: Send Slack message for deployment success
        if: success()
        uses: slackapi/slack-github-action@v1.26.0
        with:
          channel-id: 'C078VD8T2NN'  # Replace with your channel ID
          slack-message: "Deployment succeeded! 🎉\n[Commit URL](${{ github.event.workflow_run.head_commit.url }})"
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}

      - name: Send Slack message for deployment failure
        if: failure()
        uses: slackapi/slack-github-action@v1.26.0
        with:
          channel-id: 'C078VD8T2NN'  # Replace with your channel ID
          slack-message: "Deployment failed. 😞\n[Commit URL](${{ github.event.workflow_run.head_commit.url }})"
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
      - name: "Send email notification for the latest version of the deployment"
        uses: dawidd6/action-send-mail@v3
        with:
           username: prcenturionboy@gmail.com
           password: ${{ secrets.EMAIL_PASSWORD }}
           server_address: smtp.gmail.com
           server_port: 465
           secure: true
           subject: "New Docker Container release"
           to: "dewcapontaareh@gmail.com"
           from: "Admin_DevOps"
           body: "New Docker Container startup"