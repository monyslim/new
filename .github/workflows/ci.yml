name: CI
on:
  push:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v2

      - name: Use Node.js
        uses: actions/setup-node@v1
        with:
          node-version: 12

      - name: Install Dependencies
        run: npm install

      - name: "Log into Docker Hub"
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Build Docker image
        env:
          IMAGE_NAME: test-image
          VERSION: 1.1
          USERNAME: monyslim
        run: |
          docker build -t $USERNAME/$IMAGE_NAME:$VERSION .

      - name: Push Docker image to Docker Hub
        env:
          IMAGE_NAME: test-image
          VERSION: 1.1
          USERNAME: monyslim
        run: |
          docker push $USERNAME/$IMAGE_NAME:$VERSION

  notify:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Send Slack message for build success
        if: success()
        uses: slackapi/slack-github-action@v1.26.0
        with:
          channel-id: 'C078VD8T2NN'  # Replace with your channel ID
          slack-message: "GitHub build succeeded! 🎉\n[Build URL](${{ github.event.head_commit.url }})"
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}

      - name: Send Slack message for build failure
        if: failure()
        uses: slackapi/slack-github-action@v1.26.0
        with:
          channel-id: 'C078VD8T2NN'  # Replace with your channel ID
          slack-message: "GitHub build failed. 😞\n[Build URL](${{ github.event.head_commit.url }})"
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
      - name: Send mail
        uses: dawidd6/action-send-mail@v3
        with:
              # Specify connection via URL (replaces server_address, server_port, secure,
              # username and password)
              #
              # Format:
              #
              #  * smtp://user:password@server:port
              #  * smtp+starttls://user:password@server:port
              server_address: smtp.gmail.com
              # Server port, default 25:
              server_port: 465
              # Optional whether this connection use TLS (default is true if server_port is 465)
              secure: true
              # Optional (recommended) mail server username:
              username: ${{secrets.MAIL_USERNAME}}
              # Optional (recommended) mail server password:
              password: ${{secrets.MAIL_PASSWORD}}
              # Required mail subject:
              subject: Github Actions job result
              # Required recipients' addresses:
              to: dewcapontaareh@gmail.com
              # Required sender full name (address can be skipped):
              from: David # <user@example.com>
              # Optional plain body:
              body: Build job of ${{github.repository}} completed successfully and destroyed  !
